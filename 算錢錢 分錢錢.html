<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>算錢錢 分錢錢</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC";
  background:#f2f4f8;
  margin:0;
  padding:12px;
}

.container{
  max-width:720px;
  margin:auto;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  overflow:hidden;
}

h2{text-align:center;}

label{font-size:14px;}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0 12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:15px;
  margin-top:6px;
}

.calc{background:#4CAF50;}
.save{background:#ff9800;}
.copy{background:#2d7ff9;}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  padding:8px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th{background:#f7f7f7;}
</style>
</head>

<body>
<div class="container">

<!-- 輸入 -->
<div class="card">
<h2>算錢錢 分錢錢</h2>

<label>年份</label>
<input id="year" type="number">

<label>月份</label>
<select id="month"></select>

<label>水費</label>
<input id="water" type="number">

<label>電費</label>
<input id="electric" type="number">

<label>瓦斯費</label>
<input id="gas" type="number">

<button class="calc" onclick="calculate()">計算</button>
</div>

<!-- 結果 -->
<div class="card">
<div id="result"></div>

<button class="save" onclick="saveCloud()">儲存雲端</button>
<button class="copy" onclick="copyMsg()">複製給哥哥</button>
</div>

<!-- 表格 -->
<div class="card">
<table>
<thead>
<tr>
<th>年</th>
<th>月</th>
<th>總</th>
<th>媽</th>
<th>大哥</th>
<th>二哥</th>
<th>你</th>
<th>刪</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
deleteDoc,
doc,
getDocs,
where
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "family-bill-461b0.firebaseapp.com",
projectId: "family-bill-461b0",
storageBucket: "family-bill-461b0.firebasestorage.app",
messagingSenderId: "1066974635929",
appId: "1:1066974635929:web:d2342b4106f216d6989508"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db,"bills");

let last=null;

/* 📅 年月初始化 */
function init(){

  const y=new Date().getFullYear();
  const m=new Date().getMonth()+1;

  year.value=y;

  const list=[
    "1-2月","3-4月","5-6月",
    "7-8月","9-10月","11-12月"
  ];

  list.forEach((t,i)=>{
    const o=document.createElement("option");
    o.value=t;
    o.textContent=t;
    if(i===Math.floor((m-1)/2)) o.selected=true;
    month.appendChild(o);
  });
}

/* 🧮 計算 */
window.calculate=function(){

  const w=+water.value||0;
  const e=+electric.value||0;
  const g=+gas.value||0;

  const mg=8391;
  const car=1000;
  const moto=100;

  const total=w+e+g+mg;
  const base=total-car;
  const per=base/3;

  const b1=per+moto;
  const b2=per+moto;
  const mom=(w+e+g)-car;
  const me=per-moto*2;

  last={
    year:Number(year.value),
    month:month.value,
    total:w+e+g,
    mom,b1,b2,me
  };

  /* 📊 四行顯示 */
  result.innerHTML=`
  <div style="line-height:1.8">
    <div>👩 媽媽：${mom}</div>
    <div>👨‍🦱 大哥：${b1}</div>
    <div>👨‍🦱 二哥：${b2}</div>
    <div>🙋 我：${me}</div>
  </div>
  `;
};

/* ☁️ 存雲端 */
window.saveCloud=async function(){
if(!last)return;
await addDoc(col,{...last,time:Date.now()});
alert("已存雲端");
};

/* 📋 複製 */
window.copyMsg=function(){
if(!last)return;

navigator.clipboard.writeText(
`${last.year} ${last.month}
大哥 ${last.b1}
二哥 ${last.b2}`
);

alert("已複製");
};

/* 🗑 刪除 */
window.del=async function(id){
if(!confirm("確定刪除？"))return;
await deleteDoc(doc(db,"bills",id));
};

/* 📥 即時同步 */
onSnapshot(query(col,orderBy("time","desc")),snap=>{
const data=[];
snap.forEach(d=>data.push({...d.data(),id:d.id}));
render(data);
});

/* 🧾 表格 */
function render(data){
table.innerHTML="";
data.forEach(r=>{
table.innerHTML+=`
<tr>
<td>${r.year}</td>
<td>${r.month}</td>
<td>${r.total}</td>
<td>${r.mom}</td>
<td>${r.b1}</td>
<td>${r.b2}</td>
<td>${r.me}</td>
<td><button onclick="del('${r.id}')">刪</button></td>
</tr>`;
});
}

init();

</script>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
