<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#e9eef5">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>17算錢錢</title>

<link rel="manifest" href="manifest.json">

<style>
*{
  transition:.2s;
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

html{
  height:100%;
  background:#e9eef5;
}

/* 🔒 強制填滿劉海區（iOS 狀態列） */
html::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:env(safe-area-inset-top);
  background:#e9eef5;
  z-index:9999;
}

body{
  font-family:-apple-system,"Noto Sans TC";
  background:#e9eef5;
  margin:0;
  padding:calc(12px + env(safe-area-inset-top)) 12px 12px 12px;
  color:#3f4b5a;
  min-height:100vh;
  min-height:100dvh;
  overscroll-behavior:none;
  -webkit-overflow-scrolling:touch;
}

/* 🔒 鎖死背景層（避免 iOS 劉海/底部露色） */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:#e9eef5;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
  background-size:cover;
  background-position:center;
  opacity:0.06;
  z-index:-1;
}

.container{
  max-width:720px;
  margin:auto;
}

.card{
  background:#ffffffdd;
  backdrop-filter:blur(6px);
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 6px 20px rgba(80,100,130,0.12);
}

h2{
  text-align:center;
  color:#6c7f99;
  letter-spacing:1px;
  font-weight:700;
}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0 12px;
  border-radius:12px;
  border:1px solid #d7dde6;
  background:#f8fafc;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  color:white;
  font-size:15px;
  font-weight:700;
  letter-spacing:.5px;
  margin-top:6px;
}

.calc{
  background:#6f86a6;
  color:#f8fbff;
  text-shadow:0 1px 2px rgba(0,0,0,.25);
}
.save{
  background:#8fa6bf;
  color:#f8fbff;
  text-shadow:0 1px 2px rgba(0,0,0,.25);
}
.copy{
  background:#5f7ea3;
  color:#f8fbff;
  text-shadow:0 1px 2px rgba(0,0,0,.25);
}

.year-block{
  margin-bottom:12px;
  border-radius:16px;
  overflow:hidden;
  background:#ffffffdd;
}

.year-header{
  padding:12px;
  background:#e4ebf5;
  font-weight:700;
  cursor:pointer;
}

.records-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;
  padding:10px;
}

@media (max-width:480px){
  .records-grid{grid-template-columns:1fr;}
}

.record{
  padding:10px;
  border-radius:12px;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  font-size:13px;
  line-height:1.6;
}

.record-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}

.delete-btn{
  background:#d96c6c;
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  width:auto;
  margin:0;
  white-space:nowrap;
}

</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>17算錢錢</h2>

<label>年份</label>
<select id="year"></select>

<label>月份</label>
<select id="month"></select>

<label>水費</label>
<input id="water" type="number">

<label>電費</label>
<input id="electric" type="number">

<label>瓦斯費</label>
<input id="gas" type="number">

<button class="calc" onclick="calculate()">計算</button>
</div>

<div class="card">
<div id="result"></div>

<button class="save" onclick="saveCloud()">儲存</button>
<button class="copy" onclick="copyMsg()">複製</button>
</div>

<div id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore,collection,addDoc,onSnapshot,query,orderBy,deleteDoc,doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app=initializeApp({projectId:"family-bill-461b0"});
const db=getFirestore(app);
const col=collection(db,"bills");

let last=null;

function init(){
  const nowYear=new Date().getFullYear();

  // 年份自動生成（前後3年）
  for(let y=nowYear-3;y<=nowYear+1;y++){
    let o=document.createElement("option");
    o.value=y;
    o.textContent=y+" 年";
    if(y===nowYear)o.selected=true;
    year.appendChild(o);
  }

  // 月份
  ["1-2月","3-4月","5-6月","7-8月","9-10月","11-12月"]
  .forEach((t,i)=>{
    let o=document.createElement("option");
    o.value=t;o.textContent=t;
    if(i===Math.floor(new Date().getMonth()/2))o.selected=true;
    month.appendChild(o);
  });
}

window.calculate=function(){
let w=+water.value||0,e=+electric.value||0,g=+gas.value||0;
let total=w+e+g;
let base=total-1000;
let per=base/3;
let b=per+100;

last={
  year:+year.value,
  month:month.value,
  total,
  mom:total-1000,
  b1:b,b2:b,
  me:per-200
};

result.innerHTML=`
👩 媽媽：<b>${last.mom}</b><br>
👨‍🦱 大哥：<b>${b}</b><br>
👨‍🦱 二哥：<b>${b}</b><br>
🙋 我：<b>${last.me}</b>
`;
};

window.saveCloud=()=>last&&addDoc(col,{...last,time:Date.now()});
window.copyMsg=()=>navigator.clipboard.writeText(`${last.year} ${last.month}\n大哥 ${last.b1}\n二哥 ${last.b2}`);
window.del=id=>deleteDoc(doc(db,"bills",id));

onSnapshot(query(col,orderBy("time","desc")),snap=>{
let d=[];snap.forEach(x=>d.push({...x.data(),id:x.id}));render(d);
});

function render(data){
let g={};
data.forEach(r=>(g[r.year]=g[r.year]||[]).push(r));

list.innerHTML="";
Object.keys(g).sort((a,b)=>b-a).forEach(y=>{
list.innerHTML+=`
<div class="year-block">
<div class="year-header"
onclick="this.nextElementSibling.style.display=
this.nextElementSibling.style.display==='none'?'grid':'none'">
📅 ${y}
</div>
<div class="records-grid">
${g[y].map(r=>`
<div class="record">

<div class="record-header">
<b>📌 ${r.month}</b>
<button class="delete-btn" onclick="del('${r.id}')">刪除</button>
</div>

💰 水電瓦斯：<b>${r.total}</b><br>
👩 媽媽：<b>${r.mom}</b><br>
👨‍🦱 大哥：<b>${r.b1}</b><br>
👨‍🦱 二哥：<b>${r.b2}</b><br>
🙋 我：<b>${r.me}</b>

</div>
`).join("")}
</div>
</div>
`;
});
}

init();
</script>

</body>
</html>
